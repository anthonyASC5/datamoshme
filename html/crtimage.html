<!DOCTYPE html>
<html lang="en">
  <head>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CRT Image</title>
    <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --line: rgba(111, 201, 255, 0.58);
        --line-soft: rgba(111, 201, 255, 0.16);
        --text: #f0f7ff;
        --muted: #7f9abf;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background:
          radial-gradient(circle at top, rgba(75, 103, 255, 0.18), transparent 24%),
          radial-gradient(circle at 80% 18%, rgba(42, 158, 255, 0.14), transparent 24%),
          #00050d;
        color: var(--text);
        font-family: "Orbitron", sans-serif;
      }

      .page {
        min-height: 100vh;
        padding: 18px;
      }

      .shell {
        max-width: 1480px;
        margin: 0 auto;
        border: 2px solid var(--line);
        background: linear-gradient(180deg, rgba(3, 9, 24, 0.96), rgba(2, 4, 12, 0.98));
        box-shadow:
          0 0 34px rgba(79, 130, 255, 0.14),
          inset 0 0 0 1px rgba(255, 255, 255, 0.04);
      }

      .titlebar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 14px 16px;
        border-bottom: 2px solid var(--line);
        background: rgba(96, 177, 255, 0.08);
      }

      .titlebar h1 {
        margin: 0;
        font-family: "Press Start 2P", cursive;
        font-size: clamp(0.86rem, 2vw, 1.2rem);
        letter-spacing: 0.14rem;
      }

      .mode-tabs {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .mode-tab {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 34px;
        padding: 8px 12px 6px;
        border: 1px solid var(--line);
        color: var(--text);
        text-decoration: none;
        font-size: 0.56rem;
        letter-spacing: 0.08rem;
        text-transform: uppercase;
        background: rgba(255, 255, 255, 0.03);
      }

      .mode-tab.pixel {
        font-family: "Press Start 2P", cursive;
      }

      .mode-tab.active {
        background: linear-gradient(180deg, rgba(96, 177, 255, 0.18), rgba(79, 130, 255, 0.14));
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.04);
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(0, 1.7fr) minmax(320px, 0.55fr);
      }

      .stage-panel {
        position: relative;
        min-height: 84vh;
        border-right: 2px solid var(--line);
        padding: 16px;
      }

      #scene-root {
        border: 2px solid var(--line);
        background: #000;
        aspect-ratio: 1 / 1;
        max-height: 72vh;
        margin: 0 auto;
        overflow: hidden;
      }

      #scene-root canvas {
        width: 100%;
        height: 100%;
        display: block;
      }

      .stage-copy {
        margin-top: 14px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }

      .copy-box {
        min-height: 72px;
        border: 1px solid var(--line-soft);
        padding: 12px;
        background: rgba(255, 255, 255, 0.02);
      }

      .copy-box strong {
        display: block;
        margin-bottom: 8px;
        font-family: "Press Start 2P", cursive;
        font-size: 0.44rem;
        line-height: 1.8;
        color: #a7e8ff;
      }

      .copy-box span {
        color: var(--muted);
        font-size: 0.68rem;
        letter-spacing: 0.05rem;
      }

      .control-panel {
        padding: 12px;
      }

      .panel-group {
        border: 1px solid var(--line);
        margin-bottom: 14px;
        background: rgba(255, 255, 255, 0.018);
      }

      .panel-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px 14px;
        border-bottom: 1px solid var(--line);
        background: rgba(113, 201, 255, 0.07);
      }

      .panel-head h2 {
        margin: 0;
        font-family: "Press Start 2P", cursive;
        font-size: 0.5rem;
        letter-spacing: 0.08rem;
      }

      .panel-head span {
        color: var(--muted);
        font-size: 0.64rem;
        text-transform: uppercase;
        letter-spacing: 0.08rem;
      }

      .panel-body {
        padding: 14px;
      }

      .button-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .button,
      .file-button,
      select {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 52px;
        padding: 0 14px;
        border: 1px solid var(--line);
        background: linear-gradient(180deg, rgba(93, 164, 255, 0.14), rgba(28, 54, 128, 0.18));
        color: #fff;
        font: inherit;
        font-size: 0.74rem;
        letter-spacing: 0.12rem;
        text-transform: uppercase;
        cursor: pointer;
      }

      select {
        width: 100%;
        justify-content: flex-start;
        appearance: none;
      }

      #file-input {
        position: absolute;
        width: 1px;
        height: 1px;
        opacity: 0;
        pointer-events: none;
      }

      .meta,
      .status {
        margin-top: 12px;
        font-size: 0.68rem;
        letter-spacing: 0.05rem;
        color: var(--muted);
      }

      .status {
        min-height: 1.4em;
        color: var(--text);
      }

      .slider-grid {
        display: grid;
        gap: 12px;
      }

      .slider-row {
        display: grid;
        grid-template-columns: 120px 1fr 56px;
        gap: 10px;
        align-items: center;
      }

      .slider-row label {
        font-family: "Press Start 2P", cursive;
        font-size: 0.42rem;
        line-height: 1.8;
        text-transform: uppercase;
      }

      .slider-row output {
        justify-self: end;
        color: #a8e5ff;
        font-size: 0.74rem;
      }

      input[type="range"] {
        -webkit-appearance: none;
        appearance: none;
        width: 100%;
        height: 8px;
        background: linear-gradient(90deg, rgba(119, 218, 255, 0.9), rgba(79, 130, 255, 0.82));
        outline: none;
      }

      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 16px;
        height: 16px;
        border: 2px solid #fff;
        border-radius: 50%;
        background: #030816;
        cursor: pointer;
      }

      input[type="range"]::-moz-range-thumb {
        width: 16px;
        height: 16px;
        border: 2px solid #fff;
        border-radius: 50%;
        background: #030816;
        cursor: pointer;
      }

      .toggle-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        min-height: 52px;
        padding: 0 14px;
        border: 1px solid var(--line);
        background: linear-gradient(180deg, rgba(93, 164, 255, 0.14), rgba(28, 54, 128, 0.18));
        font-size: 0.74rem;
        letter-spacing: 0.12rem;
        text-transform: uppercase;
      }

      @media (max-width: 1080px) {
        .layout {
          grid-template-columns: 1fr;
        }

        .stage-panel {
          border-right: 0;
          border-bottom: 2px solid var(--line);
        }
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.161.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <div class="page">
      <div class="shell">
        <header class="titlebar">
          <h1>CRT IMAGE</h1>
          <nav class="mode-tabs" aria-label="Modes"></nav>
        </header>

        <main class="layout">
          <section class="stage-panel">
            <div id="scene-root" aria-hidden="true"></div>
            <div class="stage-copy">
              <div class="copy-box">
                <strong>IMAGE CRT</strong>
                <span>Upload a logo or still image and render it through the CRT image stack.</span>
              </div>
              <div class="copy-box">
                <strong>EXPORT LOOP</strong>
                <span>Capture the animated image treatment as a short WebM loop.</span>
              </div>
            </div>
          </section>

          <aside class="control-panel">
            <section class="panel-group">
              <div class="panel-head">
                <h2>Input</h2>
                <span>Image Upload</span>
              </div>
              <div class="panel-body">
                <div class="button-grid">
                  <label class="file-button" for="file-input">Upload Logo</label>
                  <button class="button" id="export-button" type="button">Export Loop</button>
                </div>
                <input id="file-input" type="file" accept="image/png,image/jpeg,image/webp" />
                <div class="meta" id="file-name">Demo texture loaded</div>
                <div class="status" id="status-text">Ready. Upload a logo to generate the hologram.</div>
              </div>
            </section>

            <section class="panel-group">
              <div class="panel-head">
                <h2>Tuning</h2>
                <span>Live</span>
              </div>
              <div class="panel-body">
                <div class="slider-grid">
                  <div class="slider-row">
                    <label for="glow-slider">Glow</label>
                    <input id="glow-slider" type="range" min="0" max="3.2" step="0.01" value="0.4" />
                    <output id="glow-output">0.40</output>
                  </div>
                  <div class="slider-row">
                    <label for="rgb-slider">RGB</label>
                    <input id="rgb-slider" type="range" min="0" max="0.02" step="0.0005" value="0.003" />
                    <output id="rgb-output">0.0030</output>
                  </div>
                  <div class="slider-row">
                    <label for="scan-slider">Scan</label>
                    <input id="scan-slider" type="range" min="0" max="0.18" step="0.001" value="0.04" />
                    <output id="scan-output">0.040</output>
                  </div>
                  <div class="slider-row">
                    <label for="grit-slider">Grit</label>
                    <input id="grit-slider" type="range" min="0" max="1.5" step="0.01" value="1.0" />
                    <output id="grit-output">1.00</output>
                  </div>
                  <div class="slider-row">
                    <label for="color-slider">Color</label>
                    <input id="color-slider" type="range" min="0" max="1" step="0.01" value="0" />
                    <output id="color-output">0.00</output>
                  </div>
                </div>
                <div class="button-grid" style="margin-top: 12px;">
                  <select id="background-select" aria-label="Background">
                    <option value="transparent">Transparent</option>
                    <option value="black" selected>Black</option>
                    <option value="navy">Navy Blue</option>
                    <option value="orange">Orange</option>
                    <option value="purple">Purple</option>
                    <option value="green">Green</option>
                    <option value="vhs-noise">VHS Noise</option>
                    <option value="art-paper">Art Texture</option>
                    <option value="moving-aurora">Moving</option>
                  </select>
                  <div class="toggle-row">
                    <label for="black-data-toggle">Black Data Preset</label>
                    <input id="black-data-toggle" type="checkbox" />
                  </div>
                </div>
              </div>
            </section>
          </aside>
        </main>
      </div>
    </div>
    <script src="../js/mode-nav.js"></script>
    <script type="module" src="../js/crt-image.js"></script>
  </body>
</html>
